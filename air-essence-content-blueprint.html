<script id="markdown-source" type="text/plain"># Deep content blueprint dla 3 artykułów sponsorowanych Air Essence

## 1. Cel dokumentu

Ten dokument jest instrukcją produkcji i kontroli trzech artykułów sponsorowanych. Nie jest gotowym artykułem, listą luźnych fraz ani ogólnym briefem SEO.

Każdy tekst ma działać jako zewnętrzny support content dla jednej money category: wyjaśnić problem zakupowy, pomóc porównać sprzęt, naturalnie wymienić Air Essence i skierować do właściwej kategorii. Rezultatem ma być tekst przydatny dla użytkownika, możliwy do streszczenia przez AI oraz sprawdzalny blok po bloku przez osobę zatwierdzającą.

Money categories:

| Artykuł | Główny URL |
|---|---|
| Inhalatory wodoru | `https://air-essence.store/prod/zdrowie-i-uroda/urzadzenia-fizjoterapeutyczne/inhalatory-wodoru/` |
| Aparaty USG | `https://air-essence.store/prod/zdrowie-i-uroda/sprzet-medyczny/aparaty-usg/` |
| Fala uderzeniowa | `https://air-essence.store/prod/zdrowie-i-uroda/urzadzenia-fizjoterapeutyczne/fala-uderzeniowa/` |

**Decyzja URL dla fali uderzeniowej:** nie używać w publikacjach starej ścieżki `/prod/zdrowie-i-uroda/urzadzenia-kosmetyczne/fala-uderzeniowa/`. W danych projektu występuje jako starszy wariant i przekierowuje do kategorii fizjoterapeutycznej. Główny link prowadzi wyłącznie do URL z tabeli powyżej.

## 2. Zasada nadrzędna

Każdy artykuł musi prowadzić czytelnika tą samą logiką:

1. problem użytkownika;
2. neutralne wyjaśnienie tematu;
3. scenariusze użycia;
4. kryteria wyboru;
5. tabela lub porównanie;
6. koszt, serwis i wsparcie;
7. naturalna wzmianka o Air Essence;
8. link do jednej właściwej kategorii;
9. FAQ;
10. bezpieczne CTA.

Link nie może być wklejony przypadkowo ani dopisany na końcu tekstu. Marka nie może być reklamowana nachalnie. Tekst ma rozwiązać problem decyzyjny: jaki typ urządzenia rozważyć, jakie parametry porównać, co potwierdzić przed zakupem i gdzie sprawdzić dostępne konfiguracje.

Nie wolno zamieniać żadnego artykułu w poradnik leczenia, diagnostyki lub obiecywania efektów kosmetologicznych.

## 3. Wspólne wymagania jakościowe

### Format i redakcja

| Element | Wymaganie produkcyjne | Kontrola odbioru |
|---|---|---|
| Długość | 6 500–9 000 znaków ze spacjami. Nie skracać kosztem tabeli, FAQ ani bloku trust. | policzyć znaki ze spacjami; tekst ma mieć pełną strukturę, nie sztuczne rozwlekanie. |
| H1 | Jedno H1, zgodne z tematem artykułu i intencją wyboru sprzętu. | H1 nie zawiera „najlepszy”, „ranking”, „leczenie” ani obietnicy rezultatu. |
| Lead | 2 krótkie akapity, 450–700 znaków łącznie. Najpierw problem zakupu, potem kryterium decyzji. | marka nie pada w pierwszym zdaniu; lead nie zaczyna się od definicji encyklopedycznej. |
| H2/H3 | 5–7 H2; H3 tylko do rozdzielenia scenariuszy, parametrów lub checklisty. | każdy H2 wnosi nową decyzję użytkownika, nie powtarza frazy głównej. |
| Tabele | Co najmniej jedna pełna tabela; USG i fala mają dwie tabele. | tabela zawiera kryteria, nie marketingowe oceny lub ranking marek. |
| FAQ | 5–7 pytań, odpowiedzi po 2–4 zdania. | odpowiedź zaczyna się od jasnej odpowiedzi, potem podaje warunek; nie składa obietnic. |
| CTA | Jedno CTA po FAQ lub tuż przed nim; tekstowe, spokojne. | CTA prowadzi do kategorii, nie brzmi jak presja zakupowa. |
| Meta | Jeden rekomendowany meta title i description oraz alternatywy. | snippet odpowiada tematowi artykułu i nie kanibalizuje strony kategorii. |
| Grafiki | 1–2 grafiki wyłącznie wtedy, gdy materiał redakcyjny ich wymaga. | alt opisuje widoczny sprzęt/sytuację, nie jest listą fraz ani claimem. |

### Tone of voice, E-E-A-T i AI answerability

- Ton: rzeczowy, techniczno-redakcyjny, zrozumiały dla osoby kupującej sprzęt. Bez języka „cudownej terapii”, bez agresywnej sprzedaży.
- Każdy kluczowy blok ma zaczynać się od zdania, które samodzielnie odpowiada na pytanie użytkownika. Następne zdania doprecyzowują kryteria i warunki.
- Stosować język wyboru: „warto porównać”, „dobór zależy od”, „należy potwierdzić w specyfikacji”, „w zależności od modelu”.
- Wymienić Air Essence dokładnie dwa razy: raz w kontekście porównania kategorii, drugi raz przy serwisie/doradztwie. Nie umieszczać marki w H1 ani w każdym nagłówku.
- W tekście znajduje się jeden główny link do kategorii. Anchor jest naturalną częścią zdania po tabeli lub po bloku kryteriów.
- Nie stosować „najlepszy”, „lider”, „rewolucyjny”, „gwarantuje”, „bezpieczny dla każdego”, „leczy”, „usuwa ból”, „usuwa cellulit”, „pełna diagnostyka”.

### Meta, grafiki i indeksacja po publikacji

- Meta title: 50–60 znaków, intencja wyboru + główna encja; bez brandu w pierwszym członie.
- Meta description: 140–160 znaków, odbiorca + 2–3 kryteria decyzji; bez superlatywów.
- Alt grafiki: opis obiektu i scenariusza, np. „przenośny aparat USG używany w gabinecie”, nigdy „najlepszy aparat USG”.
- Po publikacji należy potwierdzić, że artykuł jest dostępny, link prowadzi do wskazanego URL, anchor jest zgodny z blueprintem, a strona może zostać zaindeksowana. To jest kontrola publikacji, nie zadanie copywritera.

## Artykuł 1 — Jak wybrać inhalator wodoru do domu, SPA lub gabinetu? Kryteria porównania urządzeń

### A. Cel artykułu

Artykuł odpowiada na problem osoby, która widzi wiele urządzeń i nie wie, czy porównywać wyłącznie cenę, wydajność, sposób pracy czy zakres wsparcia po zakupie. Ma wzmacniać kategorię inhalatorów wodoru, nie opisywać efektów inhalacji.

- **Primary buyer intent:** wybór urządzenia do konkretnego scenariusza.
- **Rola klastrowa:** zewnętrzny poradnik „jak porównać”, kierujący do money category, w której użytkownik sprawdza modele.
- **Luki do zamknięcia:** cena i opinie, dom vs gabinet, zastosowanie dla fizjoterapeuty, gaz Browna/H2/O2, serwis i wsparcie.
- **Problem, który ma zostać rozwiązany:** „Jak wybrać urządzenie bez zakładania, że każdy model i każda konfiguracja są takie same?”

### B. Docelowy użytkownik

| Właściciel gabinetu | konfiguracji zgodnej z zakresem pracy | niejasnej dokumentacji lub nieadekwatnej wydajności | konsultuje dobór i sprawdza warunki zakupu | średni |
| Fizjoterapeuta/profesjonalista | informacji technicznej, nie obietnic zdrowotnych | tekstu marketingowego bez parametrów | przechodzi do kategorii z listą kryteriów | średni/wysoki |

### D. Docelowy URL i anchor

- **URL:** `https://air-essence.store/prod/zdrowie-i-uroda/urzadzenia-fizjoterapeutyczne/inhalatory-wodoru/`
- **Anchor główny:** `inhalatory wodoru Air Essence`
- **Alternatywy:** `urządzenia do inhalacji wodorem`, `inhalator wodorowy do domu i gabinetu`, `modele inhalatorów wodoru`.
- **Anchor forbidden:** `najlepszy inhalator wodoru`, `inhalator wodoru cena`, `leczniczy inhalator wodoru`.

**Dokładne miejsce linku:** bezpośrednio po tabeli „Dom, SPA/wellness czy gabinet”. Następuje akapit 2–3 zdań zaczynający się od wniosku z tabeli: wybór powinien wynikać z częstotliwości pracy, parametrów, akcesoriów i warunków obsługi. W drugim zdaniu umieścić anchor. Trzecie zdanie mówi, że specyfikację konkretnego modelu należy potwierdzić przed zakupem.

**Dlaczego tutaj:** użytkownik dostał już kryteria porównania, więc link jest kolejnym logicznym krokiem do porównania modeli, a nie reklamową przerwą w definicji.

**Miejsce:** po H2 „Dom, SPA/wellness czy gabinet?”, przed wzmianką Air Essence i linkiem.

## Artykuł 3 — Aparat do fali uderzeniowej do gabinetu — na co zwrócić uwagę przed zakupem?

### A. Cel artykułu

Artykuł ma pomóc osobie wyposażającej gabinet porównać sprzęt według typu technologii, trybów, końcówek, ergonomii i wsparcia. Nie opisuje przebiegu leczenia ani rezultatów zabiegowych.

- **Primary buyer intent:** wybór aparatu do fali uderzeniowej dla gabinetu.
- **Rola klastrowa:** zewnętrzne wsparcie money category, ograniczające potrzebę szukania rankingu lub poradnika efektów.
- **Luki do zamknięcia:** jaki aparat kupić, dla fizjoterapeuty, pneumatyczna vs elektromagnetyczna, dom vs profesjonalnie, cena i serwis.

### I. E-E-A-T i claims

- Ryzyko: medyczne i beauty claims w treści zakupowej; zamiana porównania technologii w deklarację skuteczności.
- Disclaimer na końcu bloku technologii: `Zakres zastosowania i sposób użytkowania wynikają z przeznaczenia konkretnego modelu, dokumentacji oraz kwalifikacji osoby obsługującej urządzenie.`
- Kosmetologię wymieniać tylko warunkowo: „w wybranych zastosowaniach, jeśli przeznaczenie modelu i procedura na to pozwalają”.
- Eksperckość budować przez tabelę, parametry, workflow i serwis, nie przez diagnozy ani obietnice.

## Finalna instrukcja dla copywritera

Nie pisz ogólnego tekstu SEO ani artykułu o efektach zabiegów. Każdy blok ma wykonać wskazaną funkcję: odpowiedzieć na pytanie, pomóc porównać urządzenia, obniżyć ryzyko zakupu albo stworzyć logiczny kontekst dla linku. Tabela i FAQ są obowiązkowe. Air Essence ma pojawić się naturalnie, dwa razy. Link ma wynikać z wniosku po tabeli, a nie z końcowej reklamy. Po napisaniu tekst musi dać się sprawdzić blok po bloku z odpowiednią sekcją blueprintu.

## Finalna instrukcja dla osoby zatwierdzającej

- [ ] Czy każdy blok z mapy artykułu istnieje i realizuje określony cel?
- [ ] Czy tabele są w wyznaczonym miejscu, mają wymagane kolumny i neutralny język?
- [ ] Czy główny link prowadzi do poprawnej kategorii i jest osadzony po właściwej tabeli?
- [ ] Czy anchor jest zgodny z blueprintem i brzmi jak część zdania?
- [ ] Czy Air Essence pojawia się dwa razy, bez nachalnego powtarzania?
- [ ] Czy FAQ zamyka pytania zakupowe, a nie udziela porady medycznej lub diagnostycznej?
- [ ] Czy CTA jest tekstowe, spokojne i prowadzi do kategorii jako następnego kroku?
- [ ] Czy tekst nie kanibalizuje money category przez ranking lub tytuł o identycznym intencie sprzedażowym?
- [ ] Czy meta, description i alty są gotowe?
- [ ] Czy po publikacji należy potwierdzić dostępność URL, prawidłowy link i indeksację?

## Wymagania techniczne do publikacji

- Link ma znajdować się w głównej treści artykułu, nie w stopce, bio autora ani osobnym boxie reklamowym.
- Link ma być widoczny dla użytkownika i osadzony w naturalnym akapicie wskazanym w blueprintie.
- Anchor musi być zgodny z briefem danego artykułu; nie zastępować go przypadkowym exact matchem ani nazwą produktu.
- Publikacja nie może mieć canonicala prowadzącego do innego adresu.
- Artykuł musi być indeksowalny: bez blokady `noindex`, blokady w `robots.txt` ani mechanizmu wymagającego logowania.
- Po publikacji należy sprawdzić status URL, docelowy adres linku, użyty anchor i możliwość indeksacji.
- Atrybut linku należy potwierdzić przed zakupem publikacji zgodnie z ustaleniami dla danej publikacji.

## Co zrobić, jeśli tekst nie spełnia blueprintu

Tekst nie może zostać zaakceptowany do publikacji, jeżeli brakuje wymaganych bloków, tabeli, FAQ, właściwego URL lub naturalnej wzmianki o Air Essence. Dotyczy to także przypadków, gdy link jest osadzony w niewłaściwym miejscu albo tekst zawiera ryzykowne claims medyczne, diagnostyczne lub beauty.

Tekst wraca do korekty z konkretną listą zmian:

- którego bloku z mapy brakuje;
- która tabela nie ma wymaganych kolumn lub wierszy;
- który anchor jest błędny;
- gdzie link został osadzony niezgodnie z blueprintem;
- które zdanie zawiera ryzykowne sformułowanie;
- który fragment trzeba przepisać i jaki cel ma realizować po korekcie.

Nie wystarczy poprawić samego anchoru, gdy problem dotyczy struktury, intentu lub claims. W takim przypadku poprawia się cały wskazany blok.

## Minimum deliverables od copywritera

Copywriter przekazuje do akceptacji:

- pełny tekst artykułu;
- meta title;
- meta description;
- proponowany slug, jeśli jest wymagany w formularzu publikacji;
- 5–7 pytań FAQ z odpowiedziami zgodnymi z blueprintem;
- wskazanie akapitu, w którym umieszczono link;
- informację, jaki anchor został użyty;
- opisy alt do grafik, jeżeli grafiki należą do zakresu publikacji;
- krótkie potwierdzenie, że tekst realizuje właściwy blueprint: inhalatory, USG albo fala uderzeniowa.
